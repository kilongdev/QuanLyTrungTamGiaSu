<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    Alias /QuanLyTrungTamGiaSu/backend/public /var/www/html/QuanLyTrungTamGiaSu/backend/public
    Alias /api /var/www/html/api

    RewriteEngine On

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_URI} !^/QuanLyTrungTamGiaSu/backend/public
        RewriteCond %{REQUEST_URI} !^/api
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    <Directory /var/www/html/QuanLyTrungTamGiaSu/backend/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <Directory /var/www/html/api>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
        FallbackResource /api/index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
